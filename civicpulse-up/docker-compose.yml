version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: civicpulse-postgres
    environment:
      POSTGRES_USER: civicpulse
      POSTGRES_PASSWORD: civicpulse123
      POSTGRES_DB: civicpulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civicpulse"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: civicpulse-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: civicpulse-backend
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://civicpulse:civicpulse123@postgres:5432/civicpulse
      REDIS_URL: redis://redis:6379
      JWT_SECRET: civicpulse-hackathon-secret-2024
      ML_ENGINE_URL: http://ml-engine:8000
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/uploads:/app/uploads

  ml-engine:
    build:
      context: ./ml-engine
      dockerfile: Dockerfile
    container_name: civicpulse-ml
    environment:
      DATABASE_URL: postgresql://civicpulse:civicpulse123@postgres:5432/civicpulse
      MODEL_PATH: /app/models/saved/
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ml_models:/app/models/saved

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: civicpulse-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  ml_models:
